version: "3.8"

services:
  mongo:
    image: mongo:8
    container_name: hospital-mongo
    restart: always
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: hospital-backend
    ports:
      - "4000:4000"
    restart: always
    env_file:
      - ./backend/config/config.env


  frontend:
    build: ./frontend
    container_name: hospital_frontend
    ports:
      - "5174:5173"
    restart: always
    depends_on:
      - backend
